<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>IG Caption Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>✨ IG Caption Generator</h1>

    <input 
      id="topic" 
      type="text" 
      placeholder="输入主题，例如：咖啡店开业"
    />

    <button onclick="generate()">生成文案</button>

    <div id="loading" class="hidden">生成中...</div>

    <div id="result"></div>
  </div>

  <script>
    async function generate() {
      const topic = document.getElementById("topic").value;
      const resultDiv = document.getElementById("result");
      const loading = document.getElementById("loading");

      if (!topic) {
        alert("请输入主题！");
        return;
      }

      resultDiv.innerText = "";
      loading.classList.remove("hidden");

      try {
        const res = await fetch("http://localhost:3000/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ topic })
        });

        const data = await res.json();

        loading.classList.add("hidden");
        resultDiv.innerText = data.caption;

      } catch (err) {
        loading.classList.add("hidden");
        resultDiv.innerText = "出错了，请检查后端是否开启";
      }
    }
  </script>

</body>
</html>
